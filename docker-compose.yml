version: '3.9'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DATABASE_URL=sqlite:///./invoices.db
      - UPLOAD_DIR=uploads
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:5173}
    volumes:
      - backend_data:/app/invoices.db
      - backend_uploads:/app/uploads
    restart: unless-stopped

volumes:
  backend_data:
  backend_uploads:
